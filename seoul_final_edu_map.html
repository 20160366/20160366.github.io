<html>
<head>
    <title>서울 교육 인프라 분석 지도 (최종)</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />

    <style>
        body { margin: 0; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { width: 100%; height: 100vh; background: #f0f2f5; }
        
        /* Legend Styles */
        .legend { 
            position: absolute; bottom: 30px; left: 30px; background: white; padding: 15px; 
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 1000; font-size: 13px; line-height: 1.6;
            border: 1px solid #e2e8f0;
        }
        .legend-title { font-weight: bold; font-size: 14px; margin-bottom: 10px; display: block; }
        .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        .count-badge { font-weight: bold; color: #666; font-size: 11px; margin-left: 4px; }
        
        /* Popup Styles */
        .popup-card { min-width: 240px; padding: 5px; }
        .score-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .score-bar-container { width: 100px; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
        .score-bar { height: 100%; }
        .lib-marker { background: #2c3e50; color: white; border-radius: 50%; width: 20px; height: 20px; text-align: center; line-height: 20px; font-size: 10px; border: 2px solid white; }
        
        /* Search Premium UI Styles */
        .search-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            width: 320px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: visible;
            border: 1px solid #e2e8f0;
        }
        .search-input-wrapper {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            transition: border-color 0.2s;
            border-radius: 12px;
        }
        .search-input-wrapper.active {
            border-bottom: 1px solid #e2e8f0;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }
        .search-input-wrapper svg {
            color: #94a3b8;
            margin-right: 12px;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        .search-input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 14px;
            color: #1e293b;
            font-weight: 500;
            background: transparent;
            font-family: inherit;
        }
        .search-input::placeholder {
            color: #94a3b8;
        }
        .search-clear {
            border: none;
            background: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 0;
            display: none;
            font-size: 18px;
            line-height: 1;
            margin-left: 8px;
        }
        .search-clear:hover {
            color: #64748b;
        }
        .search-results {
            max-height: 250px;
            overflow-y: auto;
            background: white;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            display: none;
            margin: 0;
            padding: 0;
            list-style: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .search-results li {
            padding: 12px 16px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid #f8fafc;
            color: #334155;
            transition: background-color 0.15s, color 0.15s;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .search-results li:last-child {
            border-bottom: none;
        }
        .search-results li:hover, .search-results li.selected {
            background-color: #f1f5f9;
            color: #2563eb;
        }
        .search-results li .school-name {
            font-weight: 600;
        }
        .search-results li .school-info {
            font-size: 11px;
            color: #64748b;
        }
        .search-results li:hover .school-info, .search-results li.selected .school-info {
            color: #3b82f6;
        }
    </style>

        var searchResults = document.getElementById('search-results');
        var inputWrapper = document.getElementById('input-wrapper');
        var searchClear = document.getElementById('search-clear');
        var currentFocus = -1;

        searchInput.addEventListener('input', function() {
            var val = this.value.trim().toLowerCase();
            closeAllLists();
            if (!val) {
                searchClear.style.display = 'none';
                return;
            }
            searchClear.style.display = 'block';
            
            var matches = [];
            for (var key in schoolMarkers) {
                if (schoolMarkers.hasOwnProperty(key)) {
                    var school = schoolMarkers[key];
                    if (school.name.toLowerCase().indexOf(val) !== -1 || key.toLowerCase().indexOf(val) !== -1) {
                        matches.push(school);
                    }
                }
            }

            // 정확한 명칭 시작 매칭 우선 정렬 후, 종합지수 순으로 보조 정렬
            matches.sort(function(a, b) {
                var aStart = a.name.toLowerCase().startsWith(val);
                var bStart = b.name.toLowerCase().startsWith(val);
                if (aStart && !bStart) return -1;
                if (!aStart && bStart) return 1;
                return b.score - a.score;
            });

            // 최대 8개 항목만 표시
            var displayMatches = matches.slice(0, 8);
            
            if (displayMatches.length > 0) {
                searchResults.style.display = 'block';
                inputWrapper.classList.add('active');
                
                displayMatches.forEach(function(school, idx) {
                    var li = document.createElement('li');
                    li.innerHTML = `
                        <span class="school-name">${school.name}</span>
                        <span class="school-info">${school.info} · 지수: <b>${school.score}점</b></span>
                    `;
                    li.addEventListener('click', function() {
                        selectSchool(school);
                    });
                    searchResults.appendChild(li);
                });
            }
        });

        // 키보드 조작 (방향키 및 엔터)
        searchInput.addEventListener('keydown', function(e) {
            var listItems = searchResults.getElementsByTagName('li');
            if (e.keyCode === 40) { // Down
                currentFocus++;
                addActive(listItems);
            } else if (e.keyCode === 38) { // Up
                currentFocus--;
                addActive(listItems);
            } else if (e.keyCode === 13) { // Enter
                e.preventDefault();
                if (currentFocus > -1) {
                    if (listItems[currentFocus]) listItems[currentFocus].click();
                } else if (listItems.length > 0) {
                    listItems[0].click(); // 포커스가 없어도 첫번째 검색결과를 선택
                }
            }
        });

        searchClear.addEventListener('click', function() {
            searchInput.value = '';
            closeAllLists();
            searchClear.style.display = 'none';
            searchInput.focus();
        });

        function addActive(x) {
            if (!x) return false;
            removeActive(x);
            if (currentFocus >= x.length) currentFocus = 0;
            if (currentFocus < 0) currentFocus = (x.length - 1);
            x[currentFocus].classList.add('selected');
            x[currentFocus].scrollIntoView({ block: 'nearest' });
        }

        function removeActive(x) {
            for (var i = 0; i < x.length; i++) {
                x[i].classList.remove('selected');
            }
        }

        function closeAllLists() {
            searchResults.innerHTML = '';
            searchResults.style.display = 'none';
            inputWrapper.classList.remove('active');
            currentFocus = -1;
        }

        document.addEventListener('click', function(e) {
            if (e.target !== searchInput && e.target !== searchResults) {
                closeAllLists();
            }
        });

        function selectSchool(school) {
            searchInput.value = school.name;
            closeAllLists();
            
            // MarkerCluster에서 숨겨진 마커를 강제로 펼친 뒤, 카메라 이동 및 팝업 활성화
            schoolCluster.zoomToShowLayer(school.marker, function() {
                map.flyTo([school.lat, school.lng], 16, {
                    animate: true,
                    duration: 1.2
                });
                
                setTimeout(function() {
                    school.marker.openPopup();
                }, 400);
            });
        }
    </script>
</body>
</html>
